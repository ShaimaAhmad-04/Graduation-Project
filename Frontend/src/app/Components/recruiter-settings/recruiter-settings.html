<div class="settings-page">

  <button class="back-btn" (click)="goBack()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back
  </button>

  <h1 class="page-title">Settings</h1>
  <p class="page-subtitle">Manage your company profile and account settings</p>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn" [class.active]="activeTab === 'company'" (click)="activeTab = 'company'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="7" width="20" height="14" rx="2"/>
        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
      </svg>
      Company Profile
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'security'" (click)="activeTab = 'security'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Security
    </button>
  </div>

  <!-- SUCCESS / ERROR -->
  <div class="success-msg" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

  <!-- COMPANY PROFILE TAB -->
  <div class="settings-card" *ngIf="activeTab === 'company'">
    <h2>Company Information</h2>
    <p class="card-subtitle">Update your company details visible to students</p>

    <div class="form-group full">
      <label>Company Name <span class="required">*</span></label>
      <input type="text" [(ngModel)]="companyName" placeholder="e.g. Acme Corp" />
    </div>

    <div class="form-group full">
      <label>Industry</label>
      <input type="text" [(ngModel)]="industry" placeholder="e.g. Software, Finance, Healthcare" />
    </div>

    <div class="form-group full">
      <label>Website</label>
      <input type="url" [(ngModel)]="website" placeholder="https://yourcompany.com" />
    </div>

    <div class="form-group full">
      <label>Description</label>
      <textarea [(ngModel)]="description" rows="4" placeholder="Tell students about your company..."></textarea>
    </div>

    <button class="btn-save" (click)="saveCompanyProfile()">Save Changes</button>
  </div>

  <!-- CONTACT INFO (read-only) -->
  <div class="settings-card" *ngIf="activeTab === 'company'">
    <h2>Contact Information</h2>
    <p class="card-subtitle">Your account contact details (read-only)</p>

    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [value]="contactEmail" disabled />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" [value]="contactPhone" disabled />
      </div>
    </div>
  </div>

  <!-- SECURITY TAB -->
  <div class="settings-card" *ngIf="activeTab === 'security'">
    <h2>Security Settings</h2>
    <p class="card-subtitle">Manage your password</p>

    <div class="form-group full">
      <label>Current Password</label>
      <input type="password" placeholder="Enter current password" [(ngModel)]="currentPassword" />
    </div>
    <div class="form-group full">
      <label>New Password</label>
      <input type="password" placeholder="Enter new password" [(ngModel)]="newPassword" />
    </div>
    <div class="form-group full">
      <label>Confirm New Password</label>
      <input type="password" placeholder="Confirm new password" [(ngModel)]="confirmNewPassword" />
    </div>

    <button class="btn-outline" (click)="updatePassword()">Update Password</button>
  </div>

</div>
